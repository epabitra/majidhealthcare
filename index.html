    <title>Majid Healthcare — Family Health & Diabetes Centre, Kalyan West</title>
    <script type="text/javascript">
      // Restores the real path after the public/404.html GitHub Pages
      // redirect trick sends it here as a query string. See that file
      // for context — this is the other half of the same mechanism.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <div id="root"></div>

  </body>
