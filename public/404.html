<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Majid Healthcare</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any unknown path. It re-encodes
      // the path into a query string and redirects to index.html, which
      // restores it via the inline script in index.html — letting React
      // Router handle deep links and refreshes on a static host.
      var pathSegmentsToKeep = 0; // custom domain served from root

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
